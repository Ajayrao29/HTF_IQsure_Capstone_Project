<div class="auth-wrapper">
  <div class="auth-card animated fadeIn">
    <div class="auth-header">
      <div class="logo-icon">🔑</div>
      <h1>Forgot Password?</h1>
      <p>No worries! Enter your email and we'll send you an OTP to reset it.</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="alert alert-danger animated shake">
      {{ error }}
    </div>

    <!-- Success Message -->
    <div *ngIf="success" class="alert animated slideInDown">
      <div class="success-icon">✔️</div>
      <p>{{ message }}</p>
      <small>Redirecting to reset page...</small>
    </div>

    <form (ngSubmit)="onSubmit()" *ngIf="!success">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-container">
          <span class="icon">✉️</span>
          <input 
            type="email" 
            id="email" 
            name="email" 
            [(ngModel)]="email" 
            placeholder="e.g. alex@example.com"
            required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Send Reset OTP</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      <div class="auth-footer">
        <p>Remember your password? <a routerLink="/login">Back to Login</a></p>
      </div>
    </form>
  </div>
</div>
