<div class="auth-wrapper">
  <!-- Abstract Premium Background -->
  <div class="auth-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="auth-content">
    <div class="auth-logo">
      <div class="logo-inner">
        <span class="logo-text">IQsure 🛡️</span>
      </div>
    </div>

    <div class="auth-card glass-card fade-in">
      <div class="auth-header">
        <div class="header-icon">
          <div class="icon-pulse"></div>
          <span class="icon">🔑</span>
        </div>
        <h1>Reset Access</h1>
        <p>No worries! Enter your email and we'll send you an OTP to regain access to your account.</p>
      </div>

      <!-- Messages -->
      <div *ngIf="error" class="alert alert-error slide-up">
        <span class="alert-icon">⚠️</span>
        {{ error }}
      </div>

      <div *ngIf="success" class="alert alert-success slide-up">
        <div class="success-wrap">
          <span class="alert-icon">✨</span>
          <div class="msg-content">
            <strong>Check your inbox</strong>
            <p>{{ message }}</p>
          </div>
        </div>
        <div class="redirect-progress"></div>
      </div>

      <form (ngSubmit)="onSubmit()" *ngIf="!success" class="auth-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input 
              type="email" 
              id="email" 
              name="email" 
              [(ngModel)]="email" 
              placeholder="name@example.com"
              required
              #emailInput="ngModel"
              [class.has-error]="emailInput.invalid && emailInput.touched">
          </div>
        </div>

        <button type="submit" class="btn-primary w-full" [disabled]="loading">
          <span *ngIf="!loading">Send Reset OTP</span>
          <span *ngIf="loading" class="btn-loader"></span>
        </button>

        <div class="auth-footer">
          <p>Remember your password? <a routerLink="/login" class="link-highlight">Back to Login</a></p>
        </div>
      </form>
    </div>

    <div class="auth-tagline">
      Secure. Smart. Simply Pink.
    </div>
  </div>
</div>
