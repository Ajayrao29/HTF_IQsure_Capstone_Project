<div class="page fade-in">
  <div class="form-header">
    <button class="btn-back" routerLink="/my-claims">← Back to My Claims</button>
    <h1>File a New Claim</h1>
    <p>Submit your claim details for quick processing and settlement.</p>
  </div>

  <div class="claim-form-card shadow-premium">
    <section class="form-section">
      <h3>Policy Selection</h3>
      <div class="form-group">
        <label>Select Active Policy *</label>
        <select [(ngModel)]="formData.userPolicyId">
          <option [ngValue]="null">— Select Policy —</option>
          @for (p of policies; track p.id) {
            <option [ngValue]="p.id">{{ p.policyTitle }} (#{{ p.id }})</option>
          }
        </select>
      </div>
    </section>

    <section class="form-section">
      <h3>Incident Details</h3>
      <div class="form-grid-2">
        <div class="form-group">
          <label>Claim Type *</label>
          <select [(ngModel)]="formData.type">
            <option value="CASHLESS">Cashless Settlement</option>
            <option value="REIMBURSEMENT">Reimbursement</option>
            <option value="ACCIDENTAL">Accidental</option>
          </select>
        </div>
        <div class="form-group">
          <label>Estimated Amount (₹) *</label>
          <input type="number" [(ngModel)]="formData.amount" placeholder="e.g. 50000">
        </div>
      </div>

      <div class="form-grid-2 mt-3">
        <div class="form-group">
          <label>Hospital Name</label>
          <input type="text" [(ngModel)]="formData.hospitalName" placeholder="Name of the hospital">
        </div>
        <div class="form-group">
          <label>Incident Date *</label>
          <input type="date" [(ngModel)]="formData.incidentDate" [max]="today">
        </div>
      </div>
    </section>

    <section class="form-section">
      <h3>Medical Information</h3>
      <div class="form-group">
        <label>Diagnosis / Problem Details</label>
        <input type="text" [(ngModel)]="formData.diagnosis" placeholder="What was the medical issue?">
      </div>
      <div class="form-group mt-3">
        <label>Additional Description</label>
        <textarea rows="4" [(ngModel)]="formData.description" placeholder="Provide more details about the incident..."></textarea>
      </div>
    </section>

    <!-- Notification Messages -->
    @if (successMessage) {
      <div class="alert alert-success">
        <span class="icon">✅</span> {{ successMessage }}
      </div>
    }
    @if (errorMessage) {
      <div class="alert alert-error">
        <span class="icon">⚠️</span> {{ errorMessage }}
      </div>
    }

    <div class="form-footer">
      <button class="btn-submit-claim" (click)="submitClaim()">
        <span class="icon">📄</span> Submit Claim Application
      </button>
    </div>
  </div>
</div>
