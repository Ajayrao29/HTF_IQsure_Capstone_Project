<div class="auth-wrapper">
  <div class="auth-card animated fadeIn">
    <div class="auth-header">
      <div class="logo-icon">🛡️</div>
      <h1>Reset Password</h1>
      <p>Enter the OTP we sent you and set your new secure password.</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="alert alert-danger animated shake">
      {{ error }}
    </div>

    <!-- Success Message -->
    <div *ngIf="success" class="alert animated slideInDown">
      <div class="success-icon">✨</div>
      <p>{{ message }}</p>
      <small>Redirecting to login...</small>
    </div>

    <form (ngSubmit)="onSubmit()" *ngIf="!success">
      <div class="form-group pulse-focus">
        <label for="otp">OTP (Verification Code)</label>
        <div class="input-container otp-input-wrapper">
          <span class="icon">🔢</span>
          <input 
            type="text" 
            id="otp" 
            name="otp" 
            [(ngModel)]="otp" 
            placeholder="6-Digit OTP"
            maxlength="6"
            required>
        </div>
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <div class="input-container">
          <span class="icon">🔒</span>
          <input 
            type="password" 
            id="newPassword" 
            name="newPassword" 
            [(ngModel)]="newPassword" 
            placeholder="Min 6 characters"
            required>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-container">
          <span class="icon">🔁</span>
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            [(ngModel)]="confirmPassword" 
            placeholder="Repeat new password"
            required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Reset Password</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      <div class="auth-footer">
        <p>Didn't get the code? <a routerLink="/forgot-password">Try again</a></p>
      </div>
    </form>
  </div>
</div>
